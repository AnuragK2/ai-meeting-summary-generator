[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to Render (same role as vercel.json)
[[redirects]]
  from = "/api/*"
  to = "https://ai-meeting-summary-generator-6evo.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — React Router client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200